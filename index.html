<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ComiLá - Login</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="login.css">

</head>

<body>

    <!-- BOTÃO DARK MODE -->

    <button id="theme-toggle"
            class="btn btn-outline-secondary position-absolute top-0 end-0 m-4 rounded-circle">

        <i class="fas fa-moon"></i>

    </button>

    <!-- LOGIN -->

    <div class="login-wrapper">

        <div class="food-card login-card">

            <!-- LOGO -->

            <div class="text-center mb-4">

                <div class="mx-auto mb-3"
                     style="
                     width:90px;
                     height:90px;">

                    <img src="Image/Gemini_Generated_Image_rf29t2rf29t2rf29.png"
                         alt="Logo ComiLá"
                         style="
                         width:100%;
                         height:100%;
                         object-fit:contain;">
                </div>

                <h2 class="fw-bold">

                    ComiLá

                </h2>

                <p class="text-muted-custom">

                    Descubra novos sabores perto de você

                </p>

            </div>

            <!-- FORM -->

            <form action="dashboard.html">

                <div class="mb-3">

                    <label class="form-label">

                        Email ou CPF

                    </label>

                    <input type="text"
                           class="form-control form-control-custom py-3"
                           placeholder="Digite seu email ou CPF"
                           required>

                </div>

                <div class="mb-4 password-container">

                    <label class="form-label">

                        Senha

                    </label>

                    <input type="password"
                           id="password"
                           class="form-control form-control-custom py-3"
                           placeholder="Digite sua senha"
                           required>

                    <i id="togglePassword"
                       class="fas fa-eye-slash password-toggle"></i>

                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <div class="form-check">

                        <input type="checkbox"
                               class="form-check-input"
                               id="remember">

                        <label class="form-check-label"
                               for="remember">

                            Lembrar-me

                        </label>

                    </div>

                    <a href="#"
                       class="text-decoration-none">

                        Esqueceu a senha?

                    </a>

                </div>

                <button type="submit"
                        class="btn btn-primary-custom w-100">

                    Entrar

                </button>

            </form>

            <!-- FOOTER -->

            <div class="text-center mt-4">

                <small class="text-muted-custom">

                    Projeto Acadêmico • Desenvolvimento de Interfaces

                </small>

            </div>

        </div>

    </div>

    <!-- JS -->

    <script src="main.js"></script>

    <script src="login.js"></script>

</body>

</html>
