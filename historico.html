<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComiLá – Histórico</title>
    <link rel="stylesheet" href="style.css">
    <!-- theme.js aplicado cedo para evitar flash de tema errado -->
    <script src="theme.js"></script>
</head>

<body>

    <div class="app-shell">

        <!-- ========== SIDEBAR ========== -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon"><img src="Gemini_Generated_Image_rf29t2rf29t2rf29.png" alt="Logo ComiLá"
                        style="
                         width:100%;
                         height:100%;
                         object-fit:contain;
                         border-radius: 50px;">
                </span>
                <span class="brand-name">ComiLá</span>
            </div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html">
                        <span class="nav-icon">🏠</span> Dashboard
                    </a></li>
                <li><a href="historico.html" class="active">
                        <span class="nav-icon">📋</span> Histórico
                    </a></li>
                <li><a href="review.html">
                        <span class="nav-icon">⭐</span> Reviews
                    </a></li>
                <li><a href="settings.html">
                        <span class="nav-icon">⚙️</span> Configurações
                    </a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="btn-theme" id="theme-toggle-sidebar">
                    <span class="theme-icon">🌙</span>
                    Alternar tema
                </button>
            </div>
        </nav>

        <!-- ========== CONTEÚDO PRINCIPAL ========== -->
        <main class="main-content">

            <div class="page-header">
                <h1>Histórico 📋</h1>
                <p>Acompanhe os restaurantes que você já visitou e marque os seus favoritos.</p>
            </div>

            <!-- Barra de ações acima da tabela -->
            <div class="historico-toolbar">
                <label class="check-favoritos">
                    <input type="checkbox" id="filtro-favoritos">
                    <span>⭐ Mostrar somente favoritos</span>
                </label>

                <button class="btn-outline btn-danger" id="btn-limpar-historico">
                    🗑️ Limpar histórico
                </button>
            </div>

            <!-- Tabela de histórico -->
            <div class="tabela-wrapper">
                <table id="tabela-historico" class="tabela-historico" style="width:100%">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Data</th>
                            <th>Restaurante</th>
                            <th>Cidade</th>
                            <th>Status</th>
                            <th class="col-favorito">Favorito</th>
                            <th class="col-acoes">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Preenchido dinamicamente por historico.js -->
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <!-- Toast de notificação (injetado pelo theme.js) -->

    <!-- jQuery + DataTables (necessários para a tabela do histórico) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/jquery.dataTables.min.js"></script>

    <script src="historico.js"></script>
</body>

</html>
